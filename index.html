<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works | Bespoke Craftsmanship</title>
    <style>
        /* Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif;
        }

        body {
            background-color: #000;
            color: white;
            overflow-x: hidden;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.7)), 
                        url('your-hero-image.jpg'); /* Image path here */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 0 20px;
        }

        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .menu-icon {
            cursor: pointer;
        }

        .menu-line {
            width: 25px;
            height: 2px;
            background-color: white;
            margin: 5px 0;
        }

        /* Hero Content */
        .sub-heading {
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #c5a47e;
            margin-bottom: 20px;
        }

        .main-title {
            font-size: clamp(35px, 8vw, 65px);
            line-height: 1.1;
            margin-bottom: 30px;
            max-width: 800px;
        }

        .cta-button {
            display: block;
            background-color: #c5a47e;
            color: black;
            padding: 18px 0;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
            max-width: 350px;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        .secondary-button {
            display: block;
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 0;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
            max-width: 350px;
            transition: 0.3s;
        }

        /* Expertise Section (Based on your image) */
        .expertise-section {
            padding: 80px 20px;
            text-align: center;
            background-color: #000;
        }

        .expertise-title {
            font-size: clamp(30px, 5vw, 45px);
            margin-bottom: 15px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .title-underline {
            width: 80px;
            height: 1px;
            background-color: #c5a47e;
            margin: 0 auto 60px auto;
        }

        .card-container {
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }

        .card-image {
            width: 100%;
            height: auto;
            display: block;
            margin-bottom: 30px;
        }

        .card-content h3 {
            font-size: 28px;
            font-weight: 400;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .card-content p {
            font-family: Arial, sans-serif;
            font-size: 16px;
            line-height: 1.8;
            color: #999;
            font-weight: 300;
        }

    </style>
</head>
<body>

    <div class="hero">
        <header>
            <div class="logo">MZ WOOD WORKS</div>
            <div class="menu-icon">
                <div class="menu-line"></div>
                <div class="menu-line"></div>
            </div>
        </header>

        <div class="sub-heading">Master Craftsmanship</div>
        <h1 class="main-title">Furniture that outlasts trends.</h1>

        <a href="#" class="cta-button">Book a Consultation</a>
        <a href="#" class="secondary-button">View Our Work</a>
    </div>

    <section class="expertise-section">
        <h2 class="expertise-title">Our Expertise</h2>
        <div class="title-underline"></div>

        <div class="card-container">
            <img src="kitchen-image.jpg" alt="Bespoke Kitchen" class="card-image">
            <div class="card-content">
                <h3>Bespoke Kitchens</h3>
                <p>
                    The heart of the home, crafted without compromise. 
                    From timeless shaker designs to sleek modern spaces, 
                    we create kitchens that define luxury living.
                </p>
            </div>
        </div>
    </section>

</body>
</html>
