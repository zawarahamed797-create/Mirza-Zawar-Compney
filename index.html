<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MZ Wood Works | Master Craftsmanship</title>
    <style>
        /* Reset basic styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Times New Roman', Times, serif; /* Serif font for luxury look */
        }

        body, html {
            height: 100%;
            background-color: #000;
        }

        /* Main Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('banner.jpg'); /* Aapki image file ka naam */
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: white;
            padding: 0 20px;
        }

        /* Header / Navigation Area */
        header {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 30px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .menu-icon {
            cursor: pointer;
        }

        .menu-line {
            width: 25px;
            height: 2px;
            background-color: white;
            margin: 5px 0;
        }

        /* Content Styles */
        .sub-heading {
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #c5a47e; /* Gold/Tan color */
            margin-bottom: 20px;
        }

        .main-title {
            font-size: clamp(40px, 8vw, 75px);
            line-height: 1.1;
            max-width: 800px;
            margin-bottom: 30px;
        }

        .description {
            font-family: Arial, sans-serif;
            font-size: 18px;
            line-height: 1.6;
            max-width: 600px;
            color: #e0e0e0;
            margin-bottom: 40px;
            font-weight: 300;
        }

        /* Button Styles */
        .cta-button {
            background-color: #c5a47e;
            color: black;
            padding: 18px 40px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s ease;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        .cta-button:hover {
            background-color: #b3936d;
        }

        .secondary-button {
            background-color: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            font-family: Arial, sans-serif;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            width: 100%;
            max-width: 400px;
            transition: 0.3s;
        }

        .secondary-button:hover {
            border-color: white;
        }

    </style>
</head>
<body>

    <div class="hero">
        <header>
            <div class="logo">MZ WOOD WORKS</div>
            <div class="menu-icon">
                <div class="menu-line"></div>
                <div class="menu-line"></div>
                <div class="menu-line"></div>
            </div>
        </header>

        <div class="sub-heading">Master Craftsmanship</div>
        
        <h1 class="main-title">Furniture that outlasts trends.</h1>

        <p class="description">
            Hand-built bespoke kitchens, wardrobes, and media walls. 
            Designed with precision, crafted with soul.
        </p>

        <a href="#" class="cta-button">Book a Consultation</a>
        <a href="#" class="secondary-button">View Our Work</a>
    </div>

</body>
</html>
