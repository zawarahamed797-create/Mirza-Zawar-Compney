<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Mirza Zawar Company</title>

<style>
:root{
  --accent:#D4AF37;
  --dark:#3E3E3E;
  --muted:#6b7280;
  --card:#F5F5F5;
  --shadow: 0 6px 18px rgba(13,27,42,0.08);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial;background:#FFF8F0;color:var(--dark)}

/* HEADER */
.header{background:#8B5E3C;padding:10px;color:white}
.brand{display:flex;align-items:center;gap:10px}
.brand img{height:60px;border-radius:8px}

/* HERO */
.slider{overflow:hidden;position:relative}
.slides{display:flex;transition:.5s}
.slide{min-width:100%;height:250px;background-size:cover;background-position:center}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;padding:20px}
.card{
  background:#e0e1dd;
  padding:12px;
  border-radius:10px;
  transition:.3s;
  opacity:0;
  transform:translateY(30px);
  animation:fadeIn .6s forwards;
}
.card:hover{
  transform:translateY(-8px) scale(1.02);
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

@keyframes fadeIn{
  to{opacity:1;transform:translateY(0)}
}

.card img{width:100%;height:140px;object-fit:cover;border-radius:8px}
.price{color:var(--accent);font-weight:bold}

/* BUTTON */
.btn{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  transition:.2s;
}
.btn.primary{background:var(--accent);color:white}
.btn:active{transform:scale(0.9)}

/* MOBILE */
@media(max-width:768px){
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<header class="header">
  <div class="brand">
    <img src="logo.jpg">
    <h2>Mirza Zawar Company</h2>
  </div>
</header>

<!-- SLIDER -->
<div class="slider">
  <div class="slides" id="slides">
    <div class="slide" style="background-image:url('slide1.png')"></div>
    <div class="slide" style="background-image:url('slide2.png')"></div>
    <div class="slide" style="background-image:url('slide3.png')"></div>
  </div>
</div>

<!-- PRODUCTS -->
<div class="grid">

<div class="card">
<img src="item1.png">
<h3>Wall Shelf (MZ01010)</h3>

<div class="price">
Price: Rs. <span class="base-price">2000</span><br>
Delivery: Rs. <span class="delivery-price">650</span><br>
Total: Rs. <span class="total-price"></span>
</div>

<button class="btn primary">Order</button>
</div>

<div class="card">
<img src="item2.png">
<h3>Wall Shelf (MZ01020)</h3>

<div class="price">
Price: Rs. <span class="base-price">1700</span><br>
Delivery: Rs. <span class="delivery-price">500</span><br>
Total: Rs. <span class="total-price"></span>
</div>

<button class="btn primary">Order</button>
</div>

<div class="card">
<img src="item3.png">
<h3>Wall Shelf (MZ01030)</h3>

<div class="price">
Price: Rs. <span class="base-price">2300</span><br>
Delivery: Rs. <span class="delivery-price">650</span><br>
Total: Rs. <span class="total-price"></span>
</div>

<button class="btn primary">Order</button>
</div>

</div>

<!-- JS -->
<script>

// AUTO TOTAL PRICE
document.querySelectorAll('.card').forEach(card=>{
  let base = card.querySelector('.base-price');
  let del = card.querySelector('.delivery-price');
  let total = card.querySelector('.total-price');

  if(base && del){
    total.innerText = parseInt(base.innerText) + parseInt(del.innerText);
  }
});

// SLIDER AUTO
let index = 0;
let slides = document.getElementById("slides");
let total = document.querySelectorAll(".slide").length;

setInterval(()=>{
  index = (index + 1) % total;
  slides.style.transform = `translateX(-${index*100}%)`;
},3000);

</script>

</body>
</html>
